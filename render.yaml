services:
  - type: web
    name: soie-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: soie-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: soie-redis
          property: connectionString

databases:
  - name: soie-db
    databaseName: soie
    user: soie

redis:
  - name: soie-redis
    ipAllowList: []