<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  /* Same base styles as welcome.html */
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400&display=swap');
  body { margin:0; padding:0; background:#FDFAF6; font-family:'Jost',Arial,sans-serif; color:#2D2D2D; }
  .wrapper { max-width:600px; margin:0 auto; background:#FDFAF6; }
  .header { background:#1A1A1A; padding:40px; text-align:center; }
  .logo { font-family:'Cormorant Garamond',Georgia,serif; font-size:32px; color:#C9A96E; letter-spacing:8px; font-weight:600; }
  .body { padding:48px 40px; }
  .headline { font-family:'Cormorant Garamond',Georgia,serif; font-size:28px; color:#1A1A1A; font-weight:600; margin:0 0 16px; }
  .text { font-size:15px; line-height:1.8; color:#4A4A4A; font-weight:300; margin:0 0 24px; }
  .cta-btn { display:inline-block; background:#1A1A1A; color:#FDFAF6 !important; text-decoration:none; padding:14px 36px; font-size:13px; letter-spacing:2px; text-transform:uppercase; font-weight:400; }
  .divider { height:1px; background:#E8E0D5; margin:32px 0; }
  .note { font-size:12px; color:#9A8F87; }
  .footer { padding:32px 40px; border-top:1px solid #E8E0D5; text-align:center; }
  .footer-text { font-size:12px; color:#9A8F87; line-height:1.8; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo">SOIE</div>
  </div>
  <div class="body">
    <p class="headline">Password Reset</p>
    <p class="text">
      We received a request to reset your SOIE account password. 
      Click the button below to create a new password.
    </p>
    <a href="{{ url }}" class="cta-btn">
  Reset Password
</a>
    <div class="divider"></div>
    <p class="note">
      This link expires in 24 hours. If you did not request a password reset, 
      please ignore this email — your account remains secure.
    </p>
  </div>
  <div class="footer">
    <p class="footer-text">SOIE — Premium Wigs</p>
  </div>
</div>
</body>
</html>
